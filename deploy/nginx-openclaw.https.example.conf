# Nginx — HTTPS reverse proxy to OpenClaw gateway on localhost:18789
#
# Replace openclaw.example.com with your real hostname everywhere below.
#
# 1) DNS: A record openclaw.example.com → this server's public IP
# 2) Copy into sites-available and enable:
#    sudo cp deploy/nginx-openclaw.https.example.conf /etc/nginx/sites-available/openclaw
#    sudo ln -sf /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/
#
# 3) TLS: sudo certbot --nginx -d openclaw.example.com
#    If Certbot appends a *second* server { listen 80; ... } block, delete the duplicate
#    so only ONE redirect from :80 to HTTPS remains (see bottom block).
#
# 4) sudo nginx -t && sudo systemctl reload nginx
#
# Set gateway.controlUi.allowedOrigins in openclaw.json to https://openclaw.example.com (your origin).

server {
    listen 443 ssl;
    server_name openclaw.example.com;

    ssl_certificate /etc/letsencrypt/live/openclaw.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name openclaw.example.com;
    return 301 https://$host$request_uri;
}
