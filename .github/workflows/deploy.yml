name: Deploy OpenClaw image to GHCR and server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  OPENCLAW_UPSTREAM_REF: main

jobs:
  build-and-push:
    name: Build OpenClaw and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v4

      - name: Clone OpenClaw upstream
        run: |
          git clone --depth 1 --branch "${OPENCLAW_UPSTREAM_REF}" \
            https://github.com/openclaw/openclaw.git upstream

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tag
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LOWER}/openclaw:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Build upstream OpenClaw image and load it locally (tag used by next Dockerfile).
      - name: Build upstream image (load)
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./upstream/Dockerfile
          load: true
          tags: openclaw-upstream:local

      # 2) Extend with gog (Gmail watch) + gh (GitHub CLI), push to GHCR.
      - name: Build and push image with gog + gh
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.openclaw-tools
          push: true
          tags: ${{ steps.meta.outputs.image }}
          build-args: |
            BASE_IMAGE=openclaw-upstream:local

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull image and restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"
            if [ ! -f .env.prod ]; then
              echo "ERROR: $DEPLOY_PATH/.env.prod is missing."
              echo "Create it on the server (copy deploy/env.prod.example) with absolute paths for OPENCLAW_CONFIG_DIR and OPENCLAW_WORKSPACE_DIR."
              exit 1
            fi
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export IMAGE_OPENCLAW="ghcr.io/${REPO_LOWER}/openclaw:latest"
            echo "IMAGE_OPENCLAW=$IMAGE_OPENCLAW" > .env
            grep -v '^IMAGE_OPENCLAW=' .env.prod >> .env || true
            if ! grep -qE '^OPENCLAW_CONFIG_DIR=.+' .env || ! grep -qE '^OPENCLAW_WORKSPACE_DIR=.+' .env; then
              echo "ERROR: .env.prod must set OPENCLAW_CONFIG_DIR and OPENCLAW_WORKSPACE_DIR (non-empty absolute paths)."
              exit 1
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
